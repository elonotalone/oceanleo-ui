<!doctype html>
<meta charset="utf-8">
<title>v15 chip unselectable smoke</title>
<style>
  body { font: 15px/1.6 system-ui, sans-serif; padding: 24px; max-width: 640px; }
  /* 与 PromptHighlightArea 将采用的 chip 样式一致：整体不可选 + 原子。 */
  [data-ph] {
    color: #059669; font-weight: 500;
    background: rgba(5,150,105,.12); border-radius: 5px; padding: 0 3px; margin: 0 1px;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    cursor: default;
  }
  #ed { border: 1px solid #ddd; border-radius: 10px; padding: 16px; outline: none; }
  .hint { color:#888; font-size:13px; }
</style>
<h3>整段占位「不可选」验证</h3>
<p class="hint">试：① 用鼠标从左往右拖选整行 —— <b>[研究领域]</b> 这个 chip 不会被高亮选中（周围字面文字会被选中，chip 被跳过）。② 双击 chip —— 选不中。③ 光标移到 chip 前按 Delete / chip 后按 Backspace —— 整个 chip 作为一个整体被删除，而不是一个字一个字。</p>
<div id="ed" contenteditable="true" spellcheck="false"></div>
<pre id="out" class="hint"></pre>
<script>
  const TOKEN_RE = /\[[^\[\]\n]+\]/g;
  function segs(t){const o=[];let last=0,m;TOKEN_RE.lastIndex=0;while((m=TOKEN_RE.exec(t))){if(m.index>last)o.push({k:'lit',t:t.slice(last,m.index)});o.push({k:'ph',t:m[0]});last=m.index+m[0].length;}if(last<t.length)o.push({k:'lit',t:t.slice(last)});return o;}
  const tmpl = "帮我写一篇关于「[研究领域]」的文献综述。字数约 [字数] 字。";
  const ed = document.getElementById('ed');
  for (const s of segs(tmpl)) {
    if (s.k==='ph'){const c=document.createElement('span');c.dataset.ph='1';c.setAttribute('contenteditable','false');c.textContent=s.t;ed.appendChild(c);}
    else ed.appendChild(document.createTextNode(s.t));
  }
  // 序列化（与 readEditorValue 一致），实时显示 value 证明字面实填、占位原样带出。
  function readVal(root){let out='';root.childNodes.forEach(ch=>{if(ch.nodeType===3)out+=ch.textContent||'';else if(ch.nodeType===1){const el=ch;if(el.dataset&&el.dataset.ph!==undefined)out+=el.textContent||'';else if(el.tagName==='BR')out+='\n';else out+=el.textContent||'';}});return out;}
  const out = document.getElementById('out');
  const show=()=>{out.textContent='value = '+JSON.stringify(readVal(ed));};
  ed.addEventListener('input',show); show();
</script>
